app-id: io.github.ChrisLauinger.MprisMiniPlayer
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: mpris-miniplayer
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=session-bus
  - --device=dri
  - --filesystem=xdg-config/autostart:create
modules:
  - name: mpris-miniplayer
    buildsystem: meson
    config-opts:
      - --buildtype=release
    sources:
      - type: dir
        path: .
