name: Feature request
description: Suggest an improvement or a new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. MPRIS MiniPlayer is a generic MPRIS client, so proposals should be useful beyond one specific media player when possible.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched the existing issues for this suggestion.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What would this feature help you accomplish?
      placeholder: I would like to... because...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you imagine the feature working, including any relevant UI behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workarounds or alternative designs you considered.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, mockups, links, or other details that help explain the request.
