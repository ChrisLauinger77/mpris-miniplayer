name: Release Flatpak

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  flatpak:
    name: Build and release Flatpak
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6.7
        with:
          manifest-path: io.github.ChrisLauinger.MprisMiniPlayer.yml
          bundle: MPRIS-MiniPlayer-${{ github.ref_name }}-x86_64.flatpak
          arch: x86_64
          cache-key: flatpak-builder-${{ github.sha }}
          verbose: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: MPRIS-MiniPlayer-${{ github.ref_name }}-x86_64.flatpak
          generate_release_notes: true
          fail_on_unmatched_files: true
