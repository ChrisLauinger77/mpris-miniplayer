name: Release

on:
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "rpm/**"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  flatpak:
    name: Build Flatpak
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@401fe28a8384095fc1531b9d320b292f0ee45adb # v6.7
        with:
          manifest-path: io.github.ChrisLauinger.MprisMiniPlayer.yml
          bundle: MPRIS-MiniPlayer-${{ github.ref_name }}-x86_64.flatpak
          arch: x86_64
          cache-key: flatpak-builder-${{ github.sha }}
          verbose: true

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: flatpak-bundle
          path: MPRIS-MiniPlayer-${{ github.ref_name }}-x86_64.flatpak
          if-no-files-found: error

  debian:
    name: Build Debian package
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            build-essential \
            debhelper \
            desktop-file-utils \
            devscripts \
            gettext \
            libadwaita-1-dev \
            libgtk-4-dev \
            meson \
            ninja-build \
            valac

      - name: Build amd64 Debian package
        run: dpkg-buildpackage -us -uc -b

      - name: Normalize Debian package name
        run: |
          mkdir -p release-assets
          cp ../mpris-miniplayer_*_amd64.deb release-assets/mpris-miniplayer_${{ github.ref_name }}_amd64.deb

      - name: Upload Debian package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: debian-package
          path: release-assets/mpris-miniplayer_${{ github.ref_name }}_amd64.deb
          if-no-files-found: error

  rpm:
    name: Build RPM package
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - name: Install build dependencies
        run: |
          dnf install -y \
            desktop-file-utils \
            gcc \
            gettext \
            git \
            gtk4-devel \
            libadwaita-devel \
            meson \
            rpm-build \
            vala

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build x86_64 RPM package
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            asset_name="mpris-miniplayer-${GITHUB_REF_NAME}.x86_64.rpm"
          else
            version="$(rpmspec -q --queryformat '%{version}' rpm/mpris-miniplayer.spec)"
            asset_name="mpris-miniplayer-${version}-test.x86_64.rpm"
          fi
          echo "RPM_ASSET_NAME=${asset_name}" >> "$GITHUB_ENV"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          mkdir -p "$HOME/rpmbuild/SOURCES"
          git archive \
            --format=tar.gz \
            --prefix="mpris-miniplayer-${version}/" \
            --output="$HOME/rpmbuild/SOURCES/mpris-miniplayer-${version}.tar.gz" \
            HEAD
          rpmbuild -bb \
            --define "pkg_version ${version}" \
            rpm/mpris-miniplayer.spec
          mkdir -p release-assets
          cp "$HOME"/rpmbuild/RPMS/x86_64/mpris-miniplayer-*.x86_64.rpm \
            "release-assets/${asset_name}"

      - name: Upload RPM package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rpm-package
          path: release-assets/${{ env.RPM_ASSET_NAME }}
          if-no-files-found: error

  release:
    name: Create GitHub release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - flatpak
      - debian
      - rpm

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            release-assets/flatpak-bundle/MPRIS-MiniPlayer-${{ github.ref_name }}-x86_64.flatpak
            release-assets/debian-package/mpris-miniplayer_${{ github.ref_name }}_amd64.deb
            release-assets/rpm-package/mpris-miniplayer-${{ github.ref_name }}.x86_64.rpm
          generate_release_notes: true
          fail_on_unmatched_files: true
