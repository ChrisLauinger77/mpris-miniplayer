name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@401fe28a8384095fc1531b9d320b292f0ee45adb # v6.7
        with:
          manifest-path: io.github.ChrisLauinger.MprisMiniPlayer.yml
          bundle: MPRIS-MiniPlayer-${{ github.ref_name }}-x86_64.flatpak
          arch: x86_64
          cache-key: flatpak-builder-${{ github.sha }}
          verbose: true

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: flatpak-bundle
          path: MPRIS-MiniPlayer-${{ github.ref_name }}-x86_64.flatpak
          if-no-files-found: error

  debian:
    name: Build Debian package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            build-essential \
            debhelper \
            desktop-file-utils \
            devscripts \
            gettext \
            libadwaita-1-dev \
            libgtk-4-dev \
            meson \
            ninja-build \
            valac

      - name: Build amd64 Debian package
        run: dpkg-buildpackage -us -uc -b

      - name: Normalize Debian package name
        run: |
          mkdir -p release-assets
          cp ../mpris-miniplayer_*_amd64.deb release-assets/mpris-miniplayer_${{ github.ref_name }}_amd64.deb

      - name: Upload Debian package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: debian-package
          path: release-assets/mpris-miniplayer_${{ github.ref_name }}_amd64.deb
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - flatpak
      - debian

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            release-assets/flatpak-bundle/MPRIS-MiniPlayer-${{ github.ref_name }}-x86_64.flatpak
            release-assets/debian-package/mpris-miniplayer_${{ github.ref_name }}_amd64.deb
          generate_release_notes: true
          fail_on_unmatched_files: true
